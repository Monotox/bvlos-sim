version: 2

updates:
  # Actions are pinned to commit SHAs, so an update here is the only way a
  # pinned action ever moves.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    groups:
      dev-dependencies:
        patterns:
          - pytest*
          - ruff
