name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    # The package claims "Operating System :: OS Independent", so at least one
    # non-Linux runner has to prove it. macOS covers the path, locale, and
    # filesystem-ordering differences that break determinism first.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked

      - name: Run ruff
        run: uv run --locked ruff check .

      - name: Run pytest
        run: uv run --locked pytest

      - name: Run CLI audit
        run: uv run --locked python bvlos_sim/scripts/cli_batch_audit.py

      - name: Build distributions
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: uv build

      - name: Smoke-test installed wheel
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          wheel_path="$(realpath dist/*.whl)"
          wheel_venv="$RUNNER_TEMP/bvlos-wheel-venv"
          extras_venv="$RUNNER_TEMP/bvlos-wheel-extras-venv"
          uv venv "$wheel_venv" --python 3.12
          uv pip install --python "$wheel_venv/bin/python" "$wheel_path"
          cd "$RUNNER_TEMP"
          "$wheel_venv/bin/bvlos-sim" --version
          "$wheel_venv/bin/bvlos-sim" --help
          for entrypoint in \
            bvlos-fetch-all \
            bvlos-fetch-geofences \
            bvlos-fetch-landing-zones \
            bvlos-fetch-obstacles \
            bvlos-fetch-population \
            bvlos-fetch-terrain \
            bvlos-fetch-wind; do
            "$wheel_venv/bin/$entrypoint" --help >/dev/null
          done
          if "$wheel_venv/bin/bvlos-sim" --help | grep -q 'bump'; then
            echo 'developer-only bump command leaked into wheel' >&2
            exit 1
          fi
          # The distribution must own exactly one top-level import name.
          # Shipping generic ones (adapters, schemas, scripts, main) silently
          # collides with any co-installed package using them, both ways.
          tops="$("$wheel_venv/bin/python" -c 'import sys, zipfile; print(" ".join(sorted({n.split("/")[0] for n in zipfile.ZipFile(sys.argv[1]).namelist() if not n.split("/")[0].endswith(".dist-info")})))' "$wheel_path")"
          echo "wheel top-level: $tops"
          if [ "$tops" != "bvlos_sim" ]; then
            echo "unexpected top-level names in wheel: $tops" >&2
            exit 1
          fi
          uv venv "$extras_venv" --python 3.12
          uv pip install --python "$extras_venv/bin/python" \
            "${wheel_path}[flight-logs,scripts,sitl]"
          "$extras_venv/bin/python" -c \
            'import pymavlink, pyulog, requests, srtm'

  sitl-live:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: uv sync --locked --extra sitl

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Pull cached SITL image or build and push it
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
          key="$(cat sitl/Containerfile sitl/launch.sh | sha256sum | cut -c1-16)"
          image="ghcr.io/monotox/bvlos-sitl:${key}"
          if podman pull "$image"; then
            podman tag "$image" bvlos-sitl
          else
            podman build -t bvlos-sitl sitl/
            podman tag bvlos-sitl "$image"
            podman push "$image" || echo "push failed (read-only token?); continuing"
          fi

      - name: Start SITL container
        run: podman run --rm -d --name bvlos-sitl -p 5760:5760 -p 5770:5770 bvlos-sitl sleep infinity

      - name: Execute live SITL tests
        env:
          BVLOS_SITL_HOST: 127.0.0.1
          BVLOS_SITL_REQUIRED: '1'
        run: uv run --locked pytest -m live_sitl --maxfail=1 tests/test_sitl_live.py

      - name: Upload SITL artifacts on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sitl-live-artifacts
          path: /tmp/pytest-of-runner/
          if-no-files-found: ignore

  flight-logs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: '3.12'

      - name: Install binary log readers
        run: uv sync --locked --extra flight-logs

      - name: Verify optional readers and ingestion tests
        run: |
          uv run --locked python -c "import pymavlink, pyulog"
          uv run --locked pytest tests/test_binary_flight_log_ingestion.py tests/test_flight_log_ingestion.py
