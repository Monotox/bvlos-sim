name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked

      # A tag that disagrees with pyproject.toml would publish a version nobody
      # can reproduce from this commit.
      - name: Verify the tag matches the packaged version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          packaged="$(uv run --locked bvlos-sim --version | tr -d '[:space:]')"
          packaged="${packaged##*[!0-9.]}"
          echo "tag=$tag packaged=$packaged"
          if [ "$tag" != "$packaged" ]; then
            echo "tag $GITHUB_REF_NAME does not match packaged version $packaged" >&2
            exit 1
          fi

      - name: Run the gate before publishing anything
        run: |
          uv run --locked ruff check .
          uv run --locked pytest
          uv run --locked python bvlos_sim/scripts/cli_batch_audit.py

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    # Trusted Publishing: PyPI mints a short-lived token from this workflow's
    # OIDC identity, so no API token is ever stored in the repository. Configure
    # the publisher once at https://pypi.org/manage/project/bvlos-sim/settings/publishing/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
