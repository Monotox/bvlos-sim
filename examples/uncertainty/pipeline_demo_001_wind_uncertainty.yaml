schema_version: uncertainty.v1
uncertainty_id: pipeline-demo-wind-uncertainty
mission_file: ../missions/pipeline_demo_001.yaml
vehicle_file: ../vehicles/quadplane_v1.yaml
samples: 200
seed: 42

# Vary east and north wind components independently around zero mean.
# Cruise power and battery capacity are also perturbed to model
# cell-to-cell variation in realistic vehicle builds.
parameters:
  wind_east_mps:
    kind: normal
    mean: 0.0
    std: 2.0

  wind_north_mps:
    kind: normal
    mean: 0.0
    std: 2.0

  cruise_power_w:
    kind: normal
    mean: 450.0
    std: 30.0

  battery_capacity_wh:
    kind: normal
    mean: 900.0
    std: 25.0
