site_name: BVLOS Simulator
site_description: >-
  Preflight energy, geofence, weather, and contingency feasibility checker for
  beyond-visual-line-of-sight (BVLOS) drone operations.
site_url: https://monotox.github.io/bvlos-sim/
repo_url: https://github.com/Monotox/bvlos-sim
repo_name: Monotox/bvlos-sim
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - CLI reference: cli.md
  - Missions and vehicles: missions.md
  - SITL: sitl.md
  - Design: design.md
  - Roadmap: roadmap.md
  - Ticket backlog: tickets/README.md

# The numbered ticket files are reachable from the Ticket Backlog page but are
# intentionally not individual nav entries; declare that so --strict does not
# treat them as accidentally-omitted pages.
not_in_nav: |
  /tickets/[0-9]*.md

strict: true

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
